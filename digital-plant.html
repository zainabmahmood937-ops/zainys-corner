<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Digital Plant</title>

<link rel="stylesheet"
href="digital-plant.css">

</head>

<body>

<div class="container">

    <h1>Digital Plant</h1>

    <p class="subtitle">
        Grow your tiny plant into a giant tree.
    </p>

    <div class="room">

        <div class="window">

            <div id="sky">

                <div id="sunMoon">
                    ☀️
                </div>

            </div>

        </div>

        <div id="plant">
            🌱
        </div>

        <div id="pot">
            🪴
        </div>

    </div>

    <div class="controls">

        <button id="waterBtn">
            💧 Water
        </button>

        <button id="sunBtn">
            ☀️ Sunlight
        </button>

        <button id="loveBtn">
            💖 Love
        </button>

        <button id="musicBtn">
            🎵 Music
        </button>

        <button id="medicineBtn">
            💊 Medicine
        </button>

        <button id="moveBtn">
            ↔ Move
        </button>

        <button id="resetBtn">
            🔄 Reset
        </button>

    </div>

    <div class="stats">

        <p id="waterText">
            Water: 50
        </p>

        <p id="sunText">
            Sunlight: 50
        </p>

        <p id="happyText">
            Happiness: 50
        </p>

        <p id="growthText">
            Growth: Baby Plant
        </p>

    </div>

    <div id="message">

        Your plant feels calm.

    </div>

</div>

<script src="digital-plant.js"></script>

</body>

</html>
