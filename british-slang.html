<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>British Slang Generator</title>

<link rel="stylesheet"
href="british-slang.css">

</head>

<body>

<div class="container">

    <h1>🇬🇧 British Slang Generator</h1>

    <p class="subtitle">
        Turn your boring sentence into absolute London chaos.
    </p>

    <textarea
    id="inputText"
    placeholder="Type something here...">
    </textarea>

    <button id="translateBtn">

        Translate To British Slang

    </button>

    <div id="outputBox">

        Your transformed sentence appears here.

    </div>

    <div id="randomFact">

        Certified by absolutely nobody from London.

    </div>

</div>

<script src="british-slang.js"></script>

</body>

</html>
