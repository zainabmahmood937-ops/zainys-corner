<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Catch The Falling Stars</title>

<link rel="stylesheet"
href="falling-stars.css">

</head>

<body>

<div class="container">

    <h1>Catch The Falling Stars</h1>

    <p class="subtitle">
        Click the stars before they reach the bottom.
    </p>

    <div class="info-bar">

        <div id="score">
            Score: 0
        </div>

        <div id="timer">
            Time: 30
        </div>

    </div>

    <div id="gameArea">

    </div>

    <button id="startBtn">
        Start Game
    </button>

    <div id="message">

        Press Start To Play

    </div>

</div>

<script src="falling-stars.js"></script>

</body>

</html>
