<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Dream Room Studio</title>

    <link rel="stylesheet"
    href="dream-room.css">

</head>

<body>

    <!-- TOP BAR -->

    <header class="top-bar">

        <div>
            DREAM ROOM STUDIO
        </div>

        <div id="roomMood">
            mood: cozy night
        </div>

    </header>


    <!-- MAIN -->

    <div class="main-layout">


        <!-- SIDEBAR -->

        <aside class="sidebar">

            <h2>
                Customize
            </h2>


            <!-- THEMES -->

            <div class="section">

                <p class="section-title">
                    Themes
                </p>

                <div class="button-grid">

                    <button onclick="setTheme('cozy')">
                        Cozy
                    </button>

                    <button onclick="setTheme('pink')">
                        Pink
                    </button>

                    <button onclick="setTheme('cyber')">
                        Cyber
                    </button>

                    <button onclick="setTheme('dark')">
                        Dark
                    </button>

                </div>

            </div>


            <!-- LIGHTING -->

            <div class="section">

                <p class="section-title">
                    Lighting
                </p>

                <div class="button-grid">

                    <button onclick="toggleLights()">
                        LED Lights
                    </button>

                    <button onclick="toggleStars()">
                        Stars
                    </button>

                    <button onclick="toggleRain()">
                        Rain
                    </button>

                    <button onclick="toggleMusic()">
                        Ambient Sound
                    </button>

                </div>

            </div>


            <!-- ITEMS -->

            <div class="section">

                <p class="section-title">
                    Add Items
                </p>

                <div class="button-grid">

                    <button onclick="togglePlant()">
                        Plant
                    </button>

                    <button onclick="togglePosters()">
                        Posters
                    </button>

                    <button onclick="togglePC()">
                        Gaming Setup
                    </button>

                    <button onclick="toggleCat()">
                        Cat
                    </button>

                </div>

            </div>


            <!-- ROOM SLIDER -->

            <div class="section">

                <p class="section-title">
                    Brightness
                </p>

                <input type="range"
                min="50"
                max="130"
                value="100"
                id="brightnessSlider">

            </div>


            <!-- SAVE -->

            <div class="section">

                <button class="big-btn"
                onclick="randomizeRoom()">

                    Randomize Room

                </button>

            </div>


            <div id="messageBox">

                your room is looking cozy ✨

            </div>

        </aside>


        <!-- ROOM -->

        <main class="room-wrapper">

            <div class="room"
            id="room">


                <!-- WALL -->

                <div class="wall"
                id="wall"></div>


                <!-- RAIN -->

                <div id="rain-container"></div>


                <!-- STARS -->

                <div id="stars-container"></div>


                <!-- LED -->

                <div class="led-strip"
                id="ledStrip"></div>


                <!-- POSTERS -->

                <div class="poster poster1 hidden"
                id="poster1">

                    MUSIC

                </div>

                <div class="poster poster2 hidden"
                id="poster2">

                    DREAM BIG

                </div>


                <!-- WINDOW -->

                <div class="window">

                    <div class="moon"></div>

                </div>


                <!-- BED -->

                <div class="bed">

                    <div class="pillow"></div>

                    <div class="blanket"></div>

                </div>


                <!-- DESK -->

                <div class="desk"></div>


                <!-- MONITOR -->

                <div class="monitor"
                id="monitor">

                    <div class="screen-glow"></div>

                </div>


                <!-- CHAIR -->

                <div class="chair"></div>


                <!-- PLANT -->

                <div class="plant hidden"
                id="plant">

                    🌿

                </div>


                <!-- CAT -->

                <div class="cat hidden"
                id="cat">

                    🐈

                </div>


                <!-- SPEAKERS -->

                <div class="speaker left-speaker"></div>

                <div class="speaker right-speaker"></div>


                <!-- FLOOR -->

                <div class="floor"></div>

            </div>

        </main>

    </div>


    <!-- AUDIO -->

    <audio id="ambientAudio" loop>

        <source
        src="https://assets.mixkit.co/active_storage/sfx/2515/2515-preview.mp3"
        type="audio/mpeg">

    </audio>


    <!-- JS -->

    <script src="dream-room.js"></script>

</body>

</html>
