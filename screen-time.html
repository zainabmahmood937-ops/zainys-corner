<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Screen Time Calculator</title>

<link rel="stylesheet" href="screen-time.css">

</head>

<body>

<div class="container">

    <h1>Screen Time Calculator</h1>

    <p class="subtitle">
        Discover how much of your life has gone into screens.
    </p>

    <div class="input-section">

        <input type="number" id="hoursInput" placeholder="Hours per day">

        <input type="number" id="ageInput" placeholder="Your age">

        <button onclick="calculateScreenTime()">
            Calculate
        </button>

    </div>

    <div class="stats">

        <div class="stat-box">

            <h2 id="hoursResult">0</h2>

            <p>Total Hours</p>

        </div>

        <div class="stat-box">

            <h2 id="daysResult">0</h2>

            <p>Total Days</p>

        </div>

        <div class="stat-box">

            <h2 id="yearsResult">0</h2>

            <p>Total Years</p>

        </div>

    </div>

    <div class="comparison-box" id="comparisonText">

        Enter your details to begin.

    </div>

    <div class="timeline-section">

        <h3>Your Screen Time Timeline</h3>

        <div id="timelineBars"></div>

    </div>

</div>

<script src="screen-time.js"></script>

</body>
</html>
